# Note: The owasp/modsecurity-crs image uses /etc/nginx/templates/default.conf.template
# which generates the final config.

server {
    listen 8080;
    server_name localhost;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 8443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/certs/cert.crt;
    ssl_certificate_key /etc/nginx/certs/cert.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Important ModSecurity toggles are handled by environment variables in the CRS image,
    # but we can configure the reverse proxy here.
    
    client_max_body_size 500M; # Allow large file uploads

    location / {
        proxy_pass ${PROXY_LOCATION};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
