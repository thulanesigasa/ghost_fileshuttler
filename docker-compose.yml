version: "3.8"

services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: shuttler_web
    restart: unless-stopped
    volumes:
      - ./app:/app
      - ./shuttle_vault:/app/shuttle_vault
    environment:
      - DATABASE_URL=postgresql://shuttler:ghostpass@db:5432/shuttlerdb
      - FLASK_APP=app.py
      - FLASK_DEBUG=1
      - FLASK_ENV=development
      - LAN_IP=192.168.34.48
    networks:
      - shuttler_network
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: shuttler_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shuttler
      POSTGRES_PASSWORD: ghostpass
      POSTGRES_DB: shuttlerdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - shuttler_network

  nginx:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: shuttler_nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./nginx/certs/cert.crt:/etc/nginx/conf/server.crt:ro
      - ./nginx/certs/cert.key:/etc/nginx/conf/server.key:ro
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      - BACKEND=http://web:5000
      - PROXY_LOCATION=http://web:5000
      - SERVER_NAME=localhost
      - PORT=8080
      - SSL_PORT=8443
      - SECURITY_INI=SecRequestBodyLimit=524288000;SecRequestBodyNoFilesLimit=5242880
    networks:
      - shuttler_network
    depends_on:
      - web

networks:
  shuttler_network:

volumes:
  pgdata:
